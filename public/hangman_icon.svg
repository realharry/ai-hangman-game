<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#3b82f6" stroke="#1e40af" stroke-width="4"/>
  
  <!-- Hangman gallows -->
  <g transform="translate(30, 20)" stroke="#ffffff" stroke-width="3" fill="none">
    <!-- Base -->
    <line x1="5" y1="85" x2="35" y2="85"/>
    <!-- Pole -->
    <line x1="15" y1="85" x2="15" y2="15"/>
    <!-- Top -->
    <line x1="15" y1="15" x2="45" y2="15"/>
    <!-- Noose -->
    <line x1="45" y1="15" x2="45" y2="25"/>
    <!-- Head -->
    <circle cx="45" cy="35" r="8"/>
    <!-- Body -->
    <line x1="45" y1="43" x2="45" y2="70"/>
  </g>
  
  <!-- Game text -->
  <text x="64" y="105" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">HANGMAN</text>
</svg>
